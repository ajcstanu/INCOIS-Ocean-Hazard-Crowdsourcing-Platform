version: "3.9"

services:
  # ── Python FastAPI backend ──────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: incois-api
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - incois-net

  # ── MongoDB ─────────────────────────────────
  mongo:
    image: mongo:7
    container_name: incois-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: incois_platform
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - incois-net

  # ── Redis ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: incois-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - incois-net

volumes:
  mongo_data:
  redis_data:

networks:
  incois-net:
    driver: bridge
